<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YBM_AI | HSSE Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-base: #030712; --panel-bg: rgba(17, 24, 39, 0.7); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-base); color: #f8fafc; -webkit-font-smoothing: antialiased; background-image: radial-gradient(circle at 15% 50%, rgba(249, 115, 22, 0.05), transparent 50%); background-attachment: fixed; }
        .font-terminal { font-family: 'JetBrains Mono', monospace; }
        .glass-panel { background: var(--panel-bg); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.06); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex flex-col relative">

    <nav class="glass-panel sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-4">
            <div class="h-10 w-10 bg-orange-600 rounded-lg flex items-center justify-center font-black text-white shadow-lg shadow-orange-600/20">YBM</div>
            <h1 class="text-xl font-900 text-white">YBM_<span class="text-orange-500">AI</span></h1>
        </div>
        <div class="text-[9px] font-bold text-green-500 uppercase tracking-widest bg-green-500/10 px-3 py-1 rounded-full border border-green-500/20">System Live</div>
    </nav>

    <main class="flex-grow max-w-5xl w-full mx-auto px-4 py-12 flex flex-col gap-8">
        <section class="glass-panel rounded-3xl p-8 md:p-12 border border-white/5 shadow-2xl relative overflow-hidden">
            <h2 class="text-3xl font-900 text-white mb-4">Risk Assessment <span class="text-orange-500 italic">Terminal</span></h2>
            <div class="relative mb-6">
                <div class="absolute top-0 left-0 w-full h-8 bg-black/40 rounded-t-xl border-b border-white/5 flex items-center px-4 text-[10px] font-terminal text-slate-500">ybm_ai@enterprise:~/risk_assessment$</div>
                <textarea id="intelInput" class="w-full h-40 bg-[#0d1117] rounded-xl pt-12 pb-6 px-6 text-sm font-terminal text-green-400 border border-white/10 outline-none focus:border-orange-500/40 resize-none" placeholder="> Enter observation (e.g. Worker operating forklift without medical certificate)"></textarea>
            </div>
            <button id="analyzeBtn" onclick="executeAIAudit()" class="w-full md:w-auto px-12 py-4 bg-orange-600 hover:bg-orange-700 text-white font-bold rounded-xl transition-all uppercase tracking-widest text-xs shadow-lg shadow-orange-600/20 active:scale-95">Execute Analysis</button>
        </section>

        <div id="loadingState" class="hidden flex-col items-center justify-center py-12">
            <div class="w-12 h-12 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-xs font-terminal text-orange-500 uppercase tracking-widest">Neural Processing...</p>
        </div>

        <div id="auditDashboard" class="hidden flex flex-col gap-6 animate-fade-in">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div id="scoreCard" class="glass-panel p-8 rounded-3xl flex flex-col items-center justify-center border-t-4"></div>
                <div id="summaryCard" class="glass-panel p-8 rounded-3xl md:col-span-3 flex flex-col justify-center"></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass-panel p-6 rounded-2xl"><h3 class="text-red-500 font-900 text-[10px] uppercase mb-4 tracking-widest">Mandatory Directives</h3><ul id="tacticalList" class="space-y-3 text-slate-300 text-sm"></ul></div>
                <div class="glass-panel p-6 rounded-2xl"><h3 class="text-blue-500 font-900 text-[10px] uppercase mb-4 tracking-widest">Compliance Mapping</h3><ul id="complianceList" class="space-y-3 text-slate-300 text-sm font-terminal"></ul></div>
                <div class="glass-panel p-6 rounded-2xl"><h3 class="text-orange-500 font-900 text-[10px] uppercase mb-4 tracking-widest">Human Factor Analysis</h3><p id="behavioralText" class="text-slate-300 text-sm leading-relaxed"></p></div>
            </div>
        </div>
    </main>

    <footer class="py-8 text-center text-[10px] text-slate-600 font-terminal uppercase tracking-widest border-t border-white/5">Architect: Youssef ben moussa | YBM_AI v14.0</footer>

    <script>
        const GEMINI_API_KEY = "AIzaSyAU6pa4te69dYTKa3NQCGxidBJ_yszmBR4";

        async function executeAIAudit() {
            const raw = document.getElementById('intelInput').value.trim();
            if (raw.length < 3) return;

            document.getElementById('auditDashboard').classList.add('hidden');
            document.getElementById('loadingState').classList.remove('hidden');
            const btn = document.getElementById('analyzeBtn');
            btn.disabled = true;

            try {
                const aiData = await callGeminiAPI(raw);
                renderDashboard(aiData);
            } catch (error) {
                console.error(error);
                alert("Neural Link Interrupted. Ensure your API key is active in Google Cloud Console.");
            } finally {
                document.getElementById('loadingState').classList.add('hidden');
                btn.disabled = false;
            }
        }

        async function callGeminiAPI(userInput) {
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
            
            const promptText = `Analyze this HSSE observation: "${userInput}". 
            You must return ONLY a JSON object. No other text. Format:
            {"score": 85, "label": "CRITICAL", "domains": ["Safety"], "actions": ["Action 1"], "stds": ["ISO 45001"], "humanFactor": "Text here", "riskColor": "red"}`;

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: promptText }] }]
                })
            });

            if (!response.ok) throw new Error("API call failed");
            const data = await response.json();
            let textResponse = data.candidates[0].content.parts[0].text;
            
            // SANITIZER: This removes any backticks or "json" labels the AI adds
            const cleanJson = textResponse.replace(/```json/g, "").replace(/```/g, "").trim();
            return JSON.parse(cleanJson);
        }

        function renderDashboard(data) {
            document.getElementById('auditDashboard').classList.remove('hidden');
            const color = data.riskColor === 'green' ? 'emerald' : data.riskColor;
            
            document.getElementById('scoreCard').className = `glass-panel p-8 rounded-3xl flex flex-col items-center justify-center border-t-4 border-${color}-500`;
            document.getElementById('scoreCard').innerHTML = `<span class="text-[10px] text-slate-500 uppercase mb-2">Risk Score</span><div class="text-6xl font-900 text-white">${data.score}</div><span class="text-${color}-500 font-bold text-[10px] mt-2 uppercase tracking-tighter">${data.label}</span>`;
            
            document.getElementById('summaryCard').innerHTML = `<h3 class="text-xl font-800 text-white mb-2 uppercase tracking-tight">Analysis: [ ${data.domains.join(' + ')} ]</h3><p class="text-slate-400 text-sm font-medium leading-relaxed italic">The YBM_AI core has processed the situational variables and identified systemic risks based on international HSSE standards.</p>`;
            
            document.getElementById('tacticalList').innerHTML = data.actions.map(a => `<li>• ${a}</li>`).join('');
            document.getElementById('complianceList').innerHTML = data.stds.map(s => `<li># ${s}</li>`).join('');
            document.getElementById('behavioralText').innerText = data.humanFactor;
            
            window.scrollTo({ top: document.getElementById('auditDashboard').offsetTop - 20, behavior: 'smooth' });
        }
    </script>
</body>
</html>
