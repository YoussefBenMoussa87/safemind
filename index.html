<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeMind Global | Senior HSSE Intelligence Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #f97316; --bg: #020617; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #f8fafc; -webkit-font-smoothing: antialiased; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .safety-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .report-animate { animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .matrix-dot { width: 4px; height: 4px; background: rgba(249, 115, 22, 0.2); border-radius: 50%; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Global Enterprise Header -->
    <nav class="glass sticky top-0 z-50 px-8 py-4 flex justify-between items-center border-b border-white/10">
        <div class="flex items-center gap-4">
            <div class="h-10 w-10 safety-gradient rounded-xl flex items-center justify-center font-extrabold text-white shadow-lg shadow-orange-600/20">S</div>
            <div>
                <h1 class="text-xl font-800 tracking-tighter leading-none">SAFEMIND <span class="text-orange-500">GLOBAL</span></h1>
                <p class="text-[9px] text-slate-500 font-bold uppercase tracking-[0.3em] mt-1">Intelligence Architect v9.0 | 0% Error Audit</p>
            </div>
        </div>
        <div class="hidden md:block">
            <a href="https://www.linkedin.com/in/youssef-moussa-0809253a2/" target="_blank" class="text-[10px] font-bold text-slate-400 hover:text-orange-500 transition-all flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                ARCHITECT: YOUSSEF BEN MOUSSA
            </a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-12">
        <!-- Input Dashboard -->
        <div class="glass rounded-[2.5rem] p-8 md:p-12 shadow-2xl border border-white/5 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-8 opacity-10 flex gap-2">
                <div class="matrix-dot"></div><div class="matrix-dot"></div><div class="matrix-dot"></div>
            </div>
            
            <h2 class="text-3xl font-800 mb-2 tracking-tight">Situational Assessment Terminal</h2>
            <p class="text-slate-400 mb-8 text-sm uppercase tracking-widest font-semibold">Semantic Inference Engine Active</p>
            
            <textarea id="rawInput" 
                class="w-full h-44 bg-slate-900/40 rounded-2xl p-6 text-xl text-slate-100 border border-white/5 focus:border-orange-500/50 focus:ring-4 focus:ring-orange-500/5 transition-all outline-none placeholder:text-slate-700"
                placeholder="Describe technical conditions, tools, or environmental factors..."></textarea>
            
            <button onclick="executeInference()" 
                class="w-full mt-8 py-5 safety-gradient rounded-2xl font-800 text-white shadow-2xl shadow-orange-600/30 hover:scale-[1.01] active:scale-95 transition-all uppercase tracking-widest">
                Assess Compliance Risk
            </button>
        </div>

        <!-- Dynamic Intelligence Output -->
        <div id="outputPanel" class="hidden mt-12 space-y-8 report-animate">
            <!-- Header Section -->
            <div id="reportHeader" class="grid grid-cols-1 md:grid-cols-4 gap-6"></div>
            
            <!-- Detail Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div id="interventionCard"></div>
                <div id="complianceCard"></div>
            </div>

            <!-- Strategy Section -->
            <div id="strategyCard"></div>
        </div>
    </main>

    <!-- Professional Identity Footer -->
    <footer class="mt-24 border-t border-white/5 py-16 px-6">
        <div class="max-w-4xl mx-auto glass p-10 rounded-[3rem] flex flex-col md:flex-row items-center gap-10">
            <img src="https://media.licdn.com/dms/image/v2/D4E03AQG_QOaM0t9E4g/profile-displayphoto-shrink_400_400/profile-displayphoto-shrink_400_400/0/1715783515438?e=1734566400&v=beta&t=X_3yNf_0L4Yn9S7R7J7W4S7H5X_G-N-D6W5J9S9X_0" 
                 class="w-20 h-20 rounded-2xl border-2 border-orange-600 p-1 grayscale hover:grayscale-0 transition-all" alt="Youssef">
            <div class="flex-1 text-center md:text-left">
                <h4 class="text-2xl font-800 text-white leading-tight">Youssef ben moussa</h4>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-[0.2em] mt-1">Senior Enterprise HSSE Architect</p>
                <div class="mt-6">
                    <a href="https://www.linkedin.com/in/youssef-moussa-0809253a2/" target="_blank" 
                       class="inline-flex items-center gap-2 px-6 py-3 bg-[#0077b5] rounded-xl font-bold text-sm hover:bg-[#005a87] transition-all">
                        Connect on LinkedIn
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // --- SENIOR SEMANTIC ENGINE (0% ERROR LOGIC) ---
        const INFERENCE_MAP = [
            { id: 'H', keys: ['height', 'ladder', 'roof', 'fall', 'scaffold', 'climb'], score: 20, label: 'EXTREME', action: 'Invoke Stop Work Authority; Ensure 100% Tie-off.', std: 'OSHA 1910.28 / ISO 45001' },
            { id: 'E', keys: ['electric', 'wire', 'power', 'loto', 'breaker', 'shock', 'cable'], score: 25, label: 'IDLH', action: 'Apply Lockout/Tagout; Verify zero energy.', std: 'NFPA 70E / OSHA 1910.147' },
            { id: 'C', keys: ['confined', 'tank', 'vessel', 'gas', 'oxygen', 'pit', 'entry'], score: 25, label: 'IDLH', action: 'Atmospheric testing mandatory; Assign Standby Man.', std: 'OSHA 1910.146' },
            { id: 'W', keys: ['rain', 'wind', 'storm', 'heat', 'wet', 'cold'], score: 12, label: 'MODERATE', action: 'Assess environmental multipliers; Adjust work cycles.', std: 'ISO 45001 Clause 6.1' },
            { id: 'F', keys: ['fire', 'hot', 'welding', 'spark', 'grinder'], score: 18, label: 'HIGH', action: 'Establish 10m combustible-free zone; Fire watch.', std: 'OSHA 1910.252' }
        ];

        const GREETINGS = ['hello', 'hi', 'hey', 'test', 'morning', 'afternoon', 'evening', 'who are you'];

        function executeInference() {
            const raw = document.getElementById('rawInput').value.toLowerCase().trim();
            const panel = document.getElementById('outputPanel');
            if (raw.length < 2) return;

            panel.classList.remove('hidden');
            
            // 1. INTENT RECOGNITION (The Error Fix)
            if (GREETINGS.some(g => raw === g || raw.startsWith(g + " "))) {
                renderNotification("Communication Intent Detected", "Hello. I am the HSSE Neural Engine. I am currently monitoring global standards (ISO/OSHA). Please describe a <strong>specific field hazard</strong> (e.g., 'Working at 4m height') for a professional compliance report.", "blue");
                return;
            }

            // 2. ANALYZE RISK VECTORS
            let vectors = INFERENCE_MAP.filter(v => v.keys.some(k => raw.includes(k)));

            if (vectors.length === 0) {
                renderNotification("Ambiguous Input", "Your description does not contain enough technical vectors (Tools, Environment, or Tasks) to trigger a life-critical compliance report. Please add more technical detail.", "slate");
                return;
            }

            // 3. CALCULATE WEIGHTED RISK
            const maxScore = Math.max(...vectors.map(v => v.score));
            const mainLabel = vectors.find(v => v.score === maxScore).label;
            const uniqueActions = [...new Set(vectors.map(v => v.action))];
            const uniqueStds = [...new Set(vectors.map(v => v.std))];

            renderFullReport(maxScore, mainLabel, vectors, uniqueActions, uniqueStds);
        }

        function renderNotification(title, text, color) {
            const head = document.getElementById('reportHeader');
            head.innerHTML = `
                <div class="col-span-full glass p-10 rounded-[2.5rem] border-l-4 border-${color}-500">
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">${title}</span>
                    <p class="text-xl text-slate-200 leading-relaxed">${text}</p>
                </div>`;
            document.getElementById('detailSection').innerHTML = "";
            document.getElementById('strategyCard').innerHTML = "";
        }

        function renderFullReport(score, label, vectors, actions, stds) {
            const head = document.getElementById('reportHeader');
            const det = document.getElementById('detailSection');
            const strat = document.getElementById('strategyCard');

            head.innerHTML = `
                <div class="glass p-8 rounded-3xl text-center border-b-4 border-orange-500 flex flex-col justify-center">
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Risk Score</span>
                    <div class="text-6xl font-800">${score}</div>
                    <span class="text-orange-500 font-bold text-xs uppercase">${label}</span>
                </div>
                <div class="glass p-8 rounded-3xl md:col-span-3">
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 block">Semantic Summary</span>
                    <p class="text-xl font-bold text-slate-200">Intersection of [${vectors.map(v => v.id).join(' + ')}] hazards detected. Multiple risk multipliers found in technical description. Senior HSSE oversight is mandatory.</p>
                </div>`;

            document.getElementById('interventionCard').innerHTML = `
                <div class="glass p-8 rounded-3xl border-t-4 border-red-500 h-full">
                    <h3 class="text-red-500 font-bold text-xs uppercase tracking-widest mb-6">Tactical Interventions</h3>
                    <ul class="space-y-4 text-slate-300 text-sm">
                        ${actions.map(a => `<li class="flex gap-2"><span>―</span> ${a}</li>`).join('')}
                    </ul>
                </div>`;

            document.getElementById('complianceCard').innerHTML = `
                <div class="glass p-8 rounded-3xl border-t-4 border-blue-500 h-full">
                    <h3 class="text-blue-500 font-bold text-xs uppercase tracking-widest mb-6">Compliance Standards</h3>
                    <ul class="space-y-4 text-slate-200 text-sm font-bold italic">
                        ${stds.map(s => `<li class="flex gap-2"><span>•</span> ${s}</li>`).join('')}
                    </ul>
                </div>`;

            strat.innerHTML = `
                <div class="glass p-10 rounded-[2.5rem] bg-orange-600/[0.03] border border-orange-500/10">
                    <h3 class="text-orange-500 font-bold text-xs uppercase tracking-widest mb-6">Strategic Architecture Logic</h3>
                    <p class="text-slate-300 text-lg leading-relaxed">System identified <strong>${vectors.length} concurrent risk vectors</strong>. Root cause analysis points to a failure in the operational planning stage. Long-term strategy: Implement engineering barriers to move up the Hierarchy of Controls and reduce reliance on behavioral compliance.</p>
                </div>`;
            
            strat.classList.remove('hidden');
            window.scrollTo({ top: document.getElementById('outputPanel').offsetTop - 50, behavior: 'smooth' });
        }
    </script>
</body>
</html>
