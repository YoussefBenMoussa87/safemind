<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YBM_AI | Enterprise Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
    
   <!-- Replace your current <script> block with this <script type="module"> block -->
    <script type="module">
        // Importation du moteur WebLLM depuis le CDN
        import { CreateMLCEngine } from "https://esm.run/@mlc.ai/web-llm";

        const chatFeed = document.getElementById('chatFeed');
        const userInput = document.getElementById('userInput');
        const submitBtn = document.getElementById('submitBtn');
        let totalTokens = 0;
        let engine; // Le moteur IA local

        // Horloge
        setInterval(() => { document.getElementById('clock').innerText = new Date().toISOString().split('T')[1].split('.')[0] + " UTC"; }, 1000);

        function logToTelemetry(msg) {
            const logBox = document.getElementById('systemLog');
            if(logBox) {
                logBox.innerHTML += `<p>> ${msg}</p>`;
                if(logBox.children.length > 6) logBox.removeChild(logBox.firstChild);
            }
        }

        // --- INITIALISATION DU MOTEUR LOCAL ---
        async function initializeLocalAI() {
            submitBtn.disabled = true;
            logToTelemetry(`<span class="text-brand-400">Booting Local Neural Net (WebGPU)...</span>`);
            userInput.placeholder = "> Downloading HSE Core (First time only)...";

            try {
                // Nous utilisons Llama-3-8B, optimisé pour le navigateur
                engine = await CreateMLCEngine(
                    "Llama-3-8B-Instruct-q4f32_1-MLC-1k",
                    {
                        initProgressCallback: (progress) => {
                            const percent = Math.round(progress.progress * 100);
                            logToTelemetry(`Cache sync: ${percent}%`);
                            document.getElementById('clock').innerText = `SYNC ${percent}%`;
                        }
                    }
                );
                
                logToTelemetry(`<span class="text-emerald-500">Local Engine Ready. Secure & Offline.</span>`);
                document.getElementById('clock').innerText = "ONLINE - LOCAL";
                userInput.placeholder = "> Initialize scan... Describe hazard or ask a question...";
                submitBtn.disabled = false;
            } catch (error) {
                logToTelemetry(`<span class="text-red-500">FATAL: WebGPU not supported on this device.</span>`);
                console.error(error);
            }
        }

        // Démarrer l'IA au chargement de la page
        initializeLocalAI();

        async function handleUserSubmit() {
            const text = userInput.value.trim();
            if (!text || !engine) return; // Attendre que l'IA soit chargée

            userInput.value = '';
            appendUserMessage(text);
            const typingId = appendTypingIndicator();
            scrollToBottom();
            
            submitBtn.disabled = true;
            logToTelemetry(`Processing via Local Llama-3 Engine...`);

            try {
                const aiResponse = await callLocalBackend(text);
                document.getElementById(typingId).remove();
                
                // Render Conversational Text
                appendAIMessage(aiResponse.reply);
                
                // Render Widget if Hazard Detected
                if (aiResponse.isHazard && aiResponse.riskData) {
                    setTimeout(() => {
                        appendDashboardWidget(aiResponse.riskData);
                        scrollToBottom();
                        logToTelemetry(`Risk Widget generated successfully.`);
                    }, 800);
                }
                
                scrollToBottom();
            } catch (error) {
                document.getElementById(typingId)?.remove();
                appendAIMessage("⚠️ Error: Neural Net processing failed. Ensure strict JSON formatting.");
                logToTelemetry(`<span class="text-red-500">Engine Fetch Failed.</span>`);
                console.error(error);
            } finally {
                submitBtn.disabled = false;
            }
        }

        // --- NOUVELLE FONCTION: REMPLACE LE FETCH CLOUDFLARE PAR L'IA LOCALE ---
        async function callLocalBackend(userText) {
            const systemPrompt = `You are YBM_AI, an elite Enterprise HSSE Architect. 
            Read the user's input.
            1. If it's a greeting or general question, respond conversationally and set isHazard to false.
            2. If it's a field observation or safety hazard, respond conversationally AND provide risk analysis data, setting isHazard to true.

            You MUST respond with ONLY a raw JSON object. No markdown formatting.
            {
              "reply": "Your conversational response as the AI",
              "isHazard": boolean,
              "riskData": {
                 "score": (0-100),
                 "label": "CRITICAL",
                 "color": "red",
                 "domains": ["Category 1", "Category 2"],
                 "actions": ["Action 1", "Action 2"],
                 "stds": ["ISO/OSHA Ref 1", "ISO/OSHA Ref 2"],
                 "humanFactor": "Your psychological analysis of the worker's behavior"
              }
            }`;

            // Appel direct au modèle chargé dans la RAM/GPU locale
            const reply = await engine.chat.completions.create({
                messages: [
                    { role: "system", "content": systemPrompt },
                    { role: "user", "content": userText }
                ],
                temperature: 0.2,
                response_format: { type: "json_object" } // Force le format JSON
            });

            // Mise à jour de la télémétrie des tokens (WebLLM fournit ces métriques)
            if(reply.usage) {
                totalTokens += reply.usage.total_tokens;
                const tokenEl = document.getElementById('tokenCount');
                if(tokenEl) tokenEl.innerText = `${totalTokens} / 8000`;
                logToTelemetry(`Tokens used: ${reply.usage.total_tokens}`);
            }

            let rawText = reply.choices[0].message.content;
            
            // Nettoyage rigoureux du JSON
            let cleanJson = rawText.replace(/```json/gi, "").replace(/```/g, "").trim();
            const startIndex = cleanJson.indexOf('{');
            const endIndex = cleanJson.lastIndexOf('}');
            if (startIndex !== -1 && endIndex !== -1) {
                cleanJson = cleanJson.substring(startIndex, endIndex + 1);
            }

            return JSON.parse(cleanJson);
        }

        // --- LES UI RENDERERS RESTENT INTACTS ---
        // (Copiez ici vos fonctions appendUserMessage, appendAIMessage, appendTypingIndicator, appendDashboardWidget, et scrollToBottom telles qu'elles sont dans votre code d'origine)

        function appendUserMessage(text) {
            const html = `
            <div class="flex justify-end animate-enter max-w-4xl mx-auto w-full">
                <div class="bg-white/10 border border-white/5 rounded-xl rounded-tr-sm px-5 py-3.5 text-sm text-white font-mono max-w-[80%] shadow-lg">
                    > ${text}
                </div>
            </div>`;
            chatFeed.insertAdjacentHTML('beforeend', html);
        }

        function appendAIMessage(text) {
            const html = `
            <div class="flex gap-4 animate-enter max-w-4xl mx-auto w-full">
                <div class="h-8 w-8 rounded bg-dark-800 border border-brand-500/30 flex items-center justify-center shrink-0"><span class="text-[10px] font-bold text-brand-500">AI</span></div>
                <div class="flex flex-col gap-1 w-full">
                    <span class="text-[9px] font-mono text-slate-500 uppercase tracking-widest ml-1">YBM_AI Core</span>
                    <div class="glass-panel border-white/5 rounded-xl rounded-tl-sm p-5 text-sm text-slate-200 font-medium leading-relaxed">
                        ${text}
                    </div>
                </div>
            </div>`;
            chatFeed.insertAdjacentHTML('beforeend', html);
        }

        function appendTypingIndicator() {
            const id = 'typing-' + Date.now();
            const html = `
            <div id="${id}" class="flex gap-4 animate-enter max-w-4xl mx-auto w-full">
                <div class="h-8 w-8 rounded bg-dark-800 border border-brand-500/30 flex items-center justify-center shrink-0"><span class="text-[10px] font-bold text-brand-500">AI</span></div>
                <div class="glass-panel border-white/5 rounded-xl rounded-tl-sm px-5 py-4 flex gap-2 items-center w-20">
                    <div class="w-1.5 h-1.5 bg-brand-500 rounded-full typing-pulse" style="animation-delay: 0ms;"></div>
                    <div class="w-1.5 h-1.5 bg-brand-500 rounded-full typing-pulse" style="animation-delay: 300ms;"></div>
                    <div class="w-1.5 h-1.5 bg-brand-500 rounded-full typing-pulse" style="animation-delay: 600ms;"></div>
                </div>
            </div>`;
            chatFeed.insertAdjacentHTML('beforeend', html);
            return id;
        }

        function appendDashboardWidget(data) {
            const validColors = ['red', 'orange', 'emerald'];
            let color = validColors.includes(data.color) ? data.color : 'orange';
            if (data.color === 'green') color = 'emerald';

            const tc = `text-${color}-500`;
            const bc = `border-${color}-500`;
            const bgc = `bg-${color}-500/10`;

            const html = `
            <div class="flex gap-4 animate-enter max-w-4xl mx-auto w-full ml-12 mb-4">
                <div class="w-full bg-black/60 border border-white/10 rounded-xl overflow-hidden shadow-2xl relative">
                    <div class="absolute top-0 left-0 w-full h-1 ${bgc}"></div>
                    <div class="bg-dark-800/80 px-6 py-3 border-b border-white/5 flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <svg class="w-3.5 h-3.5 ${tc}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                            <span class="text-[9px] font-mono text-slate-300 uppercase tracking-widest">Risk Intelligence Widget</span>
                        </div>
                    </div>
                    <div class="p-6 grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div class="bg-white/5 rounded-lg p-5 border-l-2 ${bc} flex flex-col items-center justify-center text-center col-span-1">
                            <span class="text-[9px] font-mono text-slate-500 uppercase tracking-widest mb-1">Index Score</span>
                            <div class="text-5xl font-900 text-white tracking-tighter">${data.score}</div>
                            <span class="px-2 py-1 mt-2 ${bgc} ${tc} text-[8px] font-bold uppercase tracking-widest rounded">${data.label}</span>
                        </div>
                        <div class="md:col-span-3 flex flex-col justify-center gap-4">
                            <div>
                                <span class="text-[9px] font-mono text-slate-500 uppercase tracking-widest block mb-1">Tactical Directives</span>
                                <ul class="text-sm text-slate-200 space-y-1">${(data.actions || []).map(a => `<li class="flex items-start gap-2"><span class="${tc}">›</span> ${a}</li>`).join('')}</ul>
                            </div>
                            <div class="grid grid-cols-2 gap-4 pt-3 border-t border-white/5">
                                <div>
                                    <span class="text-[9px] font-mono text-slate-500 uppercase tracking-widest block mb-1">Compliance Matrix</span>
                                    <p class="text-xs text-blue-400 font-mono">${(data.stds || []).join('<br>')}</p>
                                </div>
                                <div>
                                    <span class="text-[9px] font-mono text-slate-500 uppercase tracking-widest block mb-1">Human Factor</span>
                                    <p class="text-xs text-slate-400">${data.humanFactor || 'N/A'}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;
            chatFeed.insertAdjacentHTML('beforeend', html);
        }

        function scrollToBottom() { setTimeout(() => { chatFeed.scrollTo({ top: chatFeed.scrollHeight, behavior: 'smooth' }); }, 50); }
        
        // Expose handleUserSubmit to the global window object so your HTML onclick works
        window.handleUserSubmit = handleUserSubmit;
    </script>
</body>
</html>
