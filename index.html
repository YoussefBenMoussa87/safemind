<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YBM_AI | Conversational Risk Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: { brand: { 400: '#fb923c', 500: '#f97316', 600: '#ea580c' }, dark: { 900: '#050505', 800: '#0a0a0a', 700: '#121212' } }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #050505; color: #f8fafc; -webkit-font-smoothing: antialiased; 
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .glass-panel { 
            background: rgba(10, 10, 10, 0.75); 
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Custom Scrollbar for the Chat Feed */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(249, 115, 22, 0.5); }

        /* Animations */
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-message { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="selection:bg-brand-500/30 selection:text-brand-200">

    <nav class="glass-panel z-50 px-6 py-3 flex justify-between items-center border-b border-white/5 shrink-0">
        <div class="flex items-center gap-4">
            <div class="h-9 w-9 bg-gradient-to-br from-brand-400 to-red-600 rounded-lg flex items-center justify-center font-black text-white shadow-[0_0_15px_rgba(249,115,22,0.3)]">YBM</div>
            <div>
                <h1 class="text-lg font-900 tracking-tight leading-none text-white">YBM_<span class="text-brand-500">AI</span></h1>
                <p class="text-[8px] text-slate-400 font-mono uppercase tracking-[0.2em] mt-1">Conversational Edge v17.0</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <span class="flex h-2 w-2 relative"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span></span>
            <span class="hidden sm:block text-[9px] font-mono text-slate-400 uppercase tracking-widest">System Online</span>
        </div>
    </nav>

    <main class="flex-grow flex flex-col max-w-5xl w-full mx-auto relative overflow-hidden h-full">
        
        <div id="chatFeed" class="flex-grow overflow-y-auto px-4 py-8 flex flex-col gap-6 pb-40">
            
            <div class="flex gap-4 animate-message">
                <div class="h-8 w-8 rounded-full bg-dark-800 border border-white/10 flex items-center justify-center shrink-0"><span class="text-[10px] font-bold text-brand-500">AI</span></div>
                <div class="flex flex-col gap-1 max-w-[85%]">
                    <span class="text-[9px] font-mono text-slate-500 uppercase tracking-widest ml-1">YBM_AI Core</span>
                    <div class="glass-panel rounded-2xl rounded-tl-sm px-5 py-3.5 text-sm text-slate-200 font-medium leading-relaxed">
                        Terminal initialized. I am YBM_AI, an Enterprise Risk Architect. Please describe a field observation or safety condition for analysis.
                    </div>
                </div>
            </div>

        </div>

        <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-[#050505] via-[#050505] to-transparent pt-10 pb-6 px-4">
            <div class="max-w-4xl mx-auto glass-panel rounded-[1.5rem] p-2 flex items-end gap-2 border border-white/10 shadow-[0_0_40px_rgba(0,0,0,0.8)] focus-within:border-brand-500/50 transition-colors">
                <textarea id="userInput" 
                    class="w-full max-h-32 min-h-[50px] bg-transparent text-sm text-white px-4 py-3 outline-none resize-none placeholder:text-slate-600 font-medium"
                    placeholder="Type a greeting or describe a safety hazard..."
                    onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); handleUserSubmit(); }"></textarea>
                
                <button onclick="handleUserSubmit()" class="h-[50px] w-[50px] shrink-0 bg-brand-600 hover:bg-brand-500 rounded-xl flex items-center justify-center text-white shadow-lg transition-transform active:scale-90">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </div>
            <p class="text-center text-[9px] font-mono text-slate-600 uppercase tracking-[0.2em] mt-3">Architect: Youssef Ben Moussa | Proprietary NLP Engine</p>
        </div>

    </main>

    <script>
        const chatFeed = document.getElementById('chatFeed');
        const userInput = document.getElementById('userInput');

        // Main Handler
        async function handleUserSubmit() {
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Clear input & Add User Message
            userInput.value = '';
            appendUserMessage(text);
            
            // 2. Add AI Typing Indicator
            const typingId = appendTypingIndicator();
            scrollToBottom();

            // 3. Process Logic (Simulated API delay for realism)
            setTimeout(() => {
                document.getElementById(typingId).remove();
                processAIResponse(text);
                scrollToBottom();
            }, 1200 + Math.random() * 800); // Random delay between 1.2s and 2.0s
        }

        // Logic Engine
        function processAIResponse(input) {
            const txt = input.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
            const words = txt.split(' ');
            
            // Intent 1: Greeting
            const isGreeting = ['hello', 'hi', 'hey', 'test', 'morning'].some(w => words.includes(w)) && words.length < 4;
            if (isGreeting) {
                appendAIMessage("Hello! System parameters are nominal. What field condition or safety hazard would you like me to analyze today?");
                return;
            }

            // Intent 2: Unclear/Too Short
            if (words.length < 3) {
                appendAIMessage("I need more context. Please provide a detailed description of the worker's behavior, the equipment, or the environment to execute a risk analysis.");
                return;
            }

            // Intent 3: Risk Assessment (Generate Dashboard)
            appendAIMessage("Acknowledged. Parsing semantic risk vectors and cross-referencing ISO 45001 compliance standards. Generating Intelligence Dashboard...");
            
            // Small delay to make it feel like it's building the dashboard
            setTimeout(() => {
                const aiData = calculateRiskData(words);
                appendDashboardWidget(aiData);
                scrollToBottom();
            }, 1000);
        }

        // The Edge Compute Brain (No APIs needed)
        function calculateRiskData(words) {
            const match = (arr) => arr.some(k => words.includes(k));
            
            const c = {
                height: ['height', 'roof', 'fall', 'harness', 'scaffold'],
                fatigue: ['sleep', 'fatigue', 'tired', 'drowsy'],
                comp: ['permit', 'certificate', 'training', 'license'],
                ppe: ['helmet', 'ppe', 'glasses', 'gloves'],
                mach: ['forklift', 'crane', 'machine'],
                safe: ['safe', 'compliant', 'good']
            };

            if (match(c.height)) return { score: 94, label: "IMMINENT DANGER", color: "red", domains: ["WORK AT HEIGHT", "FATAL RISK"], actions: ["Halt operation immediately", "Deploy verified fall arrest systems"], stds: ["OSHA 1926.501", "ISO 45001: 8.1.2"], humanFactor: "Risk normalization. Operative lacks hazard perception." };
            if (match(c.fatigue)) return { score: 88, label: "CRITICAL RISK", color: "red", domains: ["FITNESS TO WORK"], actions: ["Suspend worker task", "Initiate medical assessment"], stds: ["ISO 45001: 7.1.2"], humanFactor: "Severe cognitive impairment suspected." };
            if (match(c.comp)) return { score: 65, label: "NON-COMPLIANT", color: "orange", domains: ["ADMINISTRATIVE CONTROL"], actions: ["Halt task", "Verify electronic registry"], stds: ["ISO 45001: 7.2"], humanFactor: "Worker assumes task competency without verification." };
            if (match(c.ppe)) return { score: 55, label: "BEHAVIORAL RISK", color: "orange", domains: ["PPE COMPLIANCE"], actions: ["Intervene and correct", "Document Toolbox Talk"], stds: ["ISO 45001: 8.1.2"], humanFactor: "Comfort prioritized over safety. Supervisory lapse." };
            if (match(c.safe)) return { score: 12, label: "NOMINAL", color: "emerald", domains: ["STANDARD OPERATIONS"], actions: ["Log positive observation"], stds: ["ISO 45001: 9.1"], humanFactor: "Positive safety culture demonstrated." };

            return { score: 48, label: "ANALYZING", color: "orange", domains: ["UNCLASSIFIED"], actions: ["Supervisor visual verification required"], stds: ["ISO 45001: 8.1"], humanFactor: "AI requires human supervisor validation of context." };
        }

        // --- UI RENDERERS ---

        function appendUserMessage(text) {
            const html = `
            <div class="flex justify-end animate-message w-full">
                <div class="bg-brand-600 rounded-2xl rounded-tr-sm px-5 py-3.5 text-sm text-white font-medium max-w-[80%] shadow-lg">
                    ${text}
                </div>
            </div>`;
            chatFeed.insertAdjacentHTML('beforeend', html);
        }

        function appendAIMessage(text) {
            const html = `
            <div class="flex gap-4 animate-message">
                <div class="h-8 w-8 rounded-full bg-dark-800 border border-white/10 flex items-center justify-center shrink-0"><span class="text-[10px] font-bold text-brand-500">AI</span></div>
                <div class="flex flex-col gap-1 max-w-[85%] w-full">
                    <span class="text-[9px] font-mono text-slate-500 uppercase tracking-widest ml-1">YBM_AI Core</span>
                    <div class="glass-panel rounded-2xl rounded-tl-sm px-5 py-3.5 text-sm text-slate-200 font-medium leading-relaxed">
                        ${text}
                    </div>
                </div>
            </div>`;
            chatFeed.insertAdjacentHTML('beforeend', html);
        }

        function appendTypingIndicator() {
            const id = 'typing-' + Date.now();
            const html = `
            <div id="${id}" class="flex gap-4 animate-message">
                <div class="h-8 w-8 rounded-full bg-dark-800 border border-white/10 flex items-center justify-center shrink-0"><span class="text-[10px] font-bold text-brand-500">AI</span></div>
                <div class="glass-panel rounded-2xl rounded-tl-sm px-5 py-4 flex gap-1 items-center w-16 h-10">
                    <div class="w-1.5 h-1.5 bg-slate-400 rounded-full typing-dot"></div>
                    <div class="w-1.5 h-1.5 bg-slate-400 rounded-full typing-dot"></div>
                    <div class="w-1.5 h-1.5 bg-slate-400 rounded-full typing-dot"></div>
                </div>
            </div>`;
            chatFeed.insertAdjacentHTML('beforeend', html);
            return id;
        }

        function appendDashboardWidget(data) {
            const tc = `text-${data.color}-500`;
            const bc = `border-${data.color}-500`;
            const bgc = `bg-${data.color}-500/10`;

            const html = `
            <div class="flex gap-4 animate-message ml-12 mb-4">
                <div class="w-full glass-panel border border-white/10 rounded-[1.5rem] overflow-hidden shadow-2xl">
                    <div class="bg-dark-800 px-6 py-4 border-b border-white/5 flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4 ${tc}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                            <span class="text-[10px] font-mono text-slate-300 uppercase tracking-widest">Risk Intelligence Widget</span>
                        </div>
                        <span class="text-[9px] font-mono text-slate-500">ID: ${Math.random().toString(36).substr(2, 6).toUpperCase()}</span>
                    </div>
                    
                    <div class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
                        
                        <div class="bg-black/30 rounded-xl p-6 border-t-2 ${bc} flex flex-col items-center justify-center text-center">
                            <span class="text-[9px] font-mono text-slate-500 uppercase tracking-widest mb-1">Index Score</span>
                            <div class="text-5xl font-900 text-white tracking-tighter">${data.score}</div>
                            <span class="px-3 py-1 mt-2 ${bgc} ${tc} text-[9px] font-bold uppercase tracking-widest rounded">${data.label}</span>
                        </div>

                        <div class="md:col-span-2 flex flex-col justify-center">
                            <h4 class="text-white font-bold text-sm mb-3 flex gap-2 items-center"><span class="${tc}">Vectors:</span> [ ${data.domains.join(' + ')} ]</h4>
                            <div class="space-y-4">
                                <div>
                                    <span class="text-[9px] font-mono text-slate-500 uppercase tracking-widest block mb-1">Directives</span>
                                    <ul class="text-sm text-slate-300 space-y-1">${data.actions.map(a => `<li>› ${a}</li>`).join('')}</ul>
                                </div>
                                <div>
                                    <span class="text-[9px] font-mono text-slate-500 uppercase tracking-widest block mb-1">Human Factor</span>
                                    <p class="text-sm text-slate-300 leading-relaxed">${data.humanFactor}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;
            chatFeed.insertAdjacentHTML('beforeend', html);
        }

        function scrollToBottom() {
            // Smooth scroll to the bottom of the feed
            setTimeout(() => {
                chatFeed.scrollTo({ top: chatFeed.scrollHeight, behavior: 'smooth' });
            }, 50);
        }
    </script>
</body>
</html>
